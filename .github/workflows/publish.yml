name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          # Intentionally omit registry-url. It writes
          # //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          # which masks Trusted Publisher OIDC and causes E404.

      - name: Upgrade npm for Trusted Publisher OIDC
        run: |
          npm install -g npm@latest
          npm --version
          printf 'registry=https://registry.npmjs.org/\n' > "$HOME/.npmrc"
          # Ensure no token auth is configured for the registry.
          if grep -q '_authToken' "$HOME/.npmrc" 2>/dev/null; then
            echo "unexpected auth token in ~/.npmrc" >&2
            exit 1
          fi

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          # Prevent any inherited token from taking precedence over OIDC.
          NODE_AUTH_TOKEN: ""

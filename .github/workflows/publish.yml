name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          # Do not set registry-url / NODE_AUTH_TOKEN — that breaks Trusted Publisher OIDC.

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # Publishes via npm Trusted Publisher OIDC — no NPM_TOKEN secret required.
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ""

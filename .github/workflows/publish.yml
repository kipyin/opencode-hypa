name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Show npm / OIDC context
        run: |
          npm --version
          node --version
          echo "repo=${{ github.repository }}"
          echo "workflow=${{ github.workflow }}"
          echo "workflow_ref=${{ github.workflow_ref }}"
          echo "ref=${{ github.ref }}"

      # Publishes via npm Trusted Publisher OIDC — do not set NODE_AUTH_TOKEN.
      - name: Publish to npm
        run: npm publish --access public --provenance
